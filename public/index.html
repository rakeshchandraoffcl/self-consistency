<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Self-Consistency Chat</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
		<div class="mx-auto max-w-4xl px-4 py-10">
			<header class="mb-8 text-center">
				<h1 class="text-3xl font-bold tracking-tight text-slate-900">
					Self-Consistency Chat
				</h1>
				<p class="mt-2 text-sm text-slate-600">
					Ask a question — OpenAI and Gemini answer in parallel, then Claude
					synthesizes the final answer.
				</p>
			</header>

			<main
				class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8"
			>
				<form id="chat-form" class="space-y-4">
					<div>
						<label
							for="question"
							class="mb-2 block text-sm font-medium text-slate-700"
						>
							Your question
						</label>
						<textarea
							id="question"
							name="question"
							rows="4"
							required
							placeholder="What would you like to ask?"
							class="w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"
						></textarea>
					</div>

					<div class="flex items-center gap-4">
						<button
							id="submit-btn"
							type="submit"
							class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
						>
							Ask
						</button>
						<p
							id="loading"
							class="hidden text-sm text-slate-500"
							aria-live="polite"
						>
							<span
								class="mr-2 inline-block h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-blue-600 align-[-2px]"
							></span>
							Waiting for responses...
						</p>
					</div>
				</form>

				<section id="responses" class="mt-8 hidden space-y-4">
					<article
						id="final-output"
						class="hidden rounded-xl border-2 border-blue-200 bg-blue-50/60 p-5"
					>
						<h2
							class="mb-3 text-sm font-semibold uppercase tracking-wide text-blue-700"
						>
							Final Output
						</h2>
						<div data-content class="text-sm text-slate-700"></div>
					</article>

					<details
						id="openai-response"
						class="hidden rounded-xl border border-slate-200 bg-slate-50"
					>
						<summary
							class="cursor-pointer list-none px-4 py-3 [&::-webkit-details-marker]:hidden"
						>
							<span
								class="inline-flex items-center gap-2 text-sm font-medium text-slate-700"
							>
								<span aria-hidden="true" class="text-slate-400" data-chevron
									>▸</span
								>
								<span
									data-badge
									class="inline-flex items-center rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-medium text-emerald-800"
									>OpenAI</span
								>
								<span class="text-slate-500">Response</span>
							</span>
						</summary>
						<div
							data-content
							class="border-t border-slate-200 px-4 py-3 text-sm text-slate-700"
						></div>
					</details>

					<details
						id="gemini-response"
						class="hidden rounded-xl border border-slate-200 bg-slate-50"
					>
						<summary
							class="cursor-pointer list-none px-4 py-3 [&::-webkit-details-marker]:hidden"
						>
							<span
								class="inline-flex items-center gap-2 text-sm font-medium text-slate-700"
							>
								<span
									aria-hidden="true"
									class="text-slate-400"
									data-chevron
									>▸</span
								>
								<span
									data-badge
									class="inline-flex items-center rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-medium text-blue-800"
									>Gemini</span
								>
								<span class="text-slate-500">Response</span>
							</span>
						</summary>
						<div
							data-content
							class="border-t border-slate-200 px-4 py-3 text-sm text-slate-700"
						></div>
					</details>
				</section>
			</main>
		</div>

		<script src="/app.js"></script>
	</body>
</html>
