<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Self-Consistency Chat</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
		<div class="mx-auto max-w-4xl px-4 py-10">
			<header class="mb-8 text-center">
				<h1 class="text-3xl font-bold tracking-tight text-slate-900">
					Self-Consistency Chat
				</h1>
				<p class="mt-2 text-sm text-slate-600">
					Ask a question and compare responses from OpenAI and Gemini side by
					side.
				</p>
			</header>

			<main
				class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8"
			>
				<form id="chat-form" class="space-y-4">
					<div>
						<label
							for="question"
							class="mb-2 block text-sm font-medium text-slate-700"
						>
							Your question
						</label>
						<textarea
							id="question"
							name="question"
							rows="4"
							required
							placeholder="What would you like to ask?"
							class="w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"
						></textarea>
					</div>

					<div class="flex items-center gap-4">
						<button
							id="submit-btn"
							type="submit"
							class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
						>
							Ask
						</button>
						<p
							id="loading"
							class="hidden text-sm text-slate-500"
							aria-live="polite"
						>
							<span
								class="mr-2 inline-block h-4 w-4 animate-spin rounded-full border-2 border-slate-300 border-t-blue-600 align-[-2px]"
							></span>
							Waiting for responses...
						</p>
					</div>
				</form>

				<section id="responses" class="mt-8 hidden">
					<h2 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-500">
						Responses
					</h2>
					<div class="grid gap-4 md:grid-cols-2">
						<article
							id="openai-response"
							class="hidden rounded-xl border border-slate-200 bg-slate-50 p-4"
						>
							<span data-badge>OpenAI</span>
							<div data-content class="mt-3 text-sm text-slate-700"></div>
						</article>

						<article
							id="gemini-response"
							class="hidden rounded-xl border border-slate-200 bg-slate-50 p-4"
						>
							<span data-badge>Gemini</span>
							<div data-content class="mt-3 text-sm text-slate-700"></div>
						</article>
					</div>
				</section>
			</main>
		</div>

		<script src="/app.js"></script>
	</body>
</html>
